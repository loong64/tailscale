name: Build tailscale for loong64

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'tailscale upstream version'
        required: true
        default: 'v1.96.4'
jobs:
  debian:
    name: Build tailscale for loong64
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Checkout tailscale sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: tailscale/tailscale
          ref: ${{ github.event.inputs.version }}
          submodules: recursive
          path: tailscale

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up loong64 Debian container
        uses: maus007/docker-run-action-fork@5ddaad0f7eedd03f64e412b1931852bd3031b273
        with:
          image: ghcr.io/loong64/loongnix:25
          options: --cpus=4 --platform linux/loong64 --privileged -v ${{ github.workspace }}:/work
          run: |
            cd /work
            apt update; apt install sudo git build-essential devscripts equivs -y
            git config --global --add safe.directory /work
            git config --global --add safe.directory /work/tailscale
            mk-build-deps -i -r -t "apt -y --no-install-recommends"
            dpkg-buildpackage -b -uc -us
            mkdir -p output_artifacts
            mv ../*.deb output_artifacts/
            
            
      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale for loong64
          path: ${{ github.workspace }}/output_artifacts/*
          compression-level: 0
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Check release
        id: check_release
        run: |
          gh release view ${{ github.event.inputs.version }} -R ${{ github.repository }} >/dev/null 2>&1 && echo "create=0" >> $GITHUB_ENV || echo "create=1" >> $GITHUB_ENV

      - name: Create release
        if: env.create == '1'
        run: |
          latestFlag="--latest=true"
          gh release create ${{ github.event.inputs.version }} -R ${{ github.repository }} --title ${{ github.event.inputs.version }} --notes "**Full Changelog**: [${{ github.event.inputs.version }}](https://github.com/siyuan-note/siyuan/releases/tag/${{ github.event.inputs.version }})" ${latestFlag} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          cd ${{ github.workspace }}/output_artifacts
          files=(*.deb)
          for i in "${files[@]}"; do
            gh release upload  ${{ github.event.inputs.version }} $i --repo ${{ github.repository }}
          done
